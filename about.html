<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運営について — 黎明戦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:#06020e;
  color:#e8e0d0;
  font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  min-height:100vh;
}
#header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:56px;
  background:rgba(4,1,10,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,168,75,0.2);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
#header-logo{
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  font-size:20px;letter-spacing:0.18em;
  color:#fff;text-decoration:none;
  display:flex;align-items:center;gap:12px;
}
#header-logo img{height:32px;filter:drop-shadow(0 0 6px rgba(255,160,60,0.4));}
#header-logo span{font-size:10px;letter-spacing:0.3em;color:rgba(200,168,75,0.6);font-family:sans-serif;}
#header-back{
  font-size:11px;letter-spacing:0.18em;
  color:rgba(200,168,75,0.7);text-decoration:none;
  border:1px solid rgba(200,168,75,0.3);
  padding:5px 14px;border-radius:2px;transition:all 0.2s;
}
#header-back:hover{background:rgba(200,168,75,0.1);color:rgba(200,168,75,1);}

#page-hero{
  padding:96px 24px 40px;text-align:center;
}
#page-hero::after{
  content:'';display:block;width:120px;height:1px;
  margin:20px auto 0;
  background:linear-gradient(90deg,transparent,rgba(200,168,75,0.6),transparent);
}
#page-title{
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  font-size:28px;letter-spacing:0.3em;color:#fff;
}
#page-subtitle{
  margin-top:8px;font-size:11px;letter-spacing:0.28em;
  color:rgba(200,168,75,0.55);text-transform:uppercase;
}

#status{
  text-align:center;font-size:11px;letter-spacing:0.15em;
  color:rgba(200,168,75,0.4);padding:16px 0;min-height:20px;
}

/* ── staff grid ── */
#staff-grid{
  max-width:800px;margin:0 auto;
  padding:16px 20px 80px;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
  gap:20px;
}

.staff-card{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  padding:24px 16px;
  border:1px solid rgba(200,168,75,0.15);
  border-radius:4px;
  background:rgba(200,168,75,0.03);
  transition:border-color 0.2s, background 0.2s;
}
.staff-card:hover{
  border-color:rgba(200,168,75,0.35);
  background:rgba(200,168,75,0.06);
}
.staff-avatar{
  width:80px;height:80px;border-radius:50%;
  object-fit:cover;
  border:1px solid rgba(200,168,75,0.25);
  filter:drop-shadow(0 0 8px rgba(200,168,75,0.15));
}
.staff-avatar-placeholder{
  width:80px;height:80px;border-radius:50%;
  background:rgba(200,168,75,0.08);
  border:1px solid rgba(200,168,75,0.2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Hiragino Mincho ProN',serif;
  font-size:24px;color:rgba(200,168,75,0.4);
}
.staff-name{
  font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
  font-size:14px;letter-spacing:0.1em;
  color:#f0e8d8;text-align:center;
}

.empty{
  text-align:center;padding:60px 20px;
  color:rgba(200,168,75,0.35);font-size:13px;letter-spacing:0.15em;
  grid-column:1/-1;
}

body::after{
  content:'';position:fixed;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(200,168,75,0.3),rgba(255,120,20,0.4),rgba(200,168,75,0.3),transparent);
  pointer-events:none;
}
</style>
</head>
<body>

<header id="header">
  <a href="index.html" id="header-logo">
    <img src="assets/images/文字のみ.png" alt="黎明戦"
         onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
    <span style="display:none;font-family:'Hiragino Mincho ProN',serif;font-size:18px;color:#fff;letter-spacing:0.2em;">黎明戦</span>
    <span>OFFICIAL</span>
  </a>
  <a href="index.html" id="header-back">← トップへ</a>
</header>

<section id="page-hero">
  <div id="page-title">運営について</div>
  <div id="page-subtitle">About Us</div>
</section>

<div id="status">読み込み中...</div>
<div id="staff-grid"></div>

<script>
async function loadStaff() {
  setStatus('読み込み中...');
  try {
    const res  = await fetch('data/staff.json');
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    render(Array.isArray(json) ? json : []);
    setStatus('');
  } catch(e) {
    setStatus('読み込みエラー: ' + e.message);
    render([]);
  }
}

function render(data) {
  const grid = document.getElementById('staff-grid');
  if (!data.length) {
    grid.innerHTML = '<div class="empty">メンバー情報はありません</div>';
    return;
  }
  grid.innerHTML = data.map(m => {
    const avatar = m.image_url
      ? `<img class="staff-avatar" src="${m.image_url}" alt="${m.name}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="staff-avatar-placeholder" ${m.image_url?'style="display:none"':''}>${(m.name||'？').slice(0,1)}</div>`;
    return `
    <div class="staff-card">
      ${avatar}${placeholder}
      <div class="staff-name">${m.name || ''}</div>
    </div>`;
  }).join('');
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

window.addEventListener('pageshow', () => {
  document.body.style.transition = 'opacity 0.4s';
  document.body.style.opacity = '1';
});

loadStaff();
</script>
</body>
</html>
